<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pawsocks</title>
  
  <!-- Google Fonts: Fuzzy Bubbles for cute bubbly style -->
  <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Fuzzy Bubbles', cursive;
      color: white;
    }

    /* Blurred + animated background */
    .background {
      position: fixed;
      inset: 0;
      background: url('https://i.pinimg.com/736x/d2/e0/ad/d2e0ad4941582ba8aab7d4d143600a71.jpg') center center / cover no-repeat;
      filter: blur(8px) brightness(0.7);
      animation: bgBreath 20s infinite ease-in-out;
      z-index: 1;
    }

    @keyframes bgBreath {
      0%, 100% { transform: scale(1.04); }
      50%      { transform: scale(1.10); }
    }

    /* Subtle full-page paw pattern overlay */
    .pattern-overlay {
      position: fixed;
      inset: 0;
      background: url('https://img.freepik.com/free-vector/paw-prints-background-dotted-decoration_18591-84211.jpg') repeat;
      background-size: 200px 200px;
      opacity: 0.12;
      pointer-events: none;
      animation: slowFloat 80s infinite linear;
      z-index: 2;
    }

    @keyframes slowFloat {
      0%   { background-position: 0 0; }
      100% { background-position: 400px 400px; }
    }

    /* Click to enter overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 1.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .enter-text {
      font-size: 5rem;
      font-weight: bold;
      text-shadow: 0 0 30px rgba(255,255,255,0.8);
      letter-spacing: 6px;
    }

    /* Main content container (centered text) */
    .content {
      position: relative;
      z-index: 4;
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .content.visible {
      display: flex;
    }

    /* Bubbly glowing text in the middle */
    .main-text {
      font-family: 'Fuzzy Bubbles', cursive;
      font-size: 5.8rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffffff;
      text-shadow: 
        0 0 15px #fff,
        0 0 30px #fff,
        0 0 50px rgba(255,255,255,0.8),
        0 0 70px rgba(255,255,255,0.5);
      animation: glowPulse 3.5s infinite ease-in-out;
      line-height: 1.1;
      margin-bottom: 1rem;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.8s ease-out;
    }

    .main-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .heart {
      font-size: 6.5rem;
      animation: pulseHeart 2s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 15px #fff, 0 0 30px #fff, 0 0 50px rgba(255,255,255,0.7); }
      50%      { text-shadow: 0 0 25px #fff, 0 0 50px #fff, 0 0 90px rgba(255,255,255,0.95); }
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.15); }
    }

    /* Top-left brand name (same style) */
    .brand-text {
      position: absolute;
      top: 40px;
      left: 50px;
      font-size: 4.2rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffffff;
      text-shadow: 
        0 0 12px #fff,
        0 0 25px #fff,
        0 0 40px rgba(255,255,255,0.6);
      opacity: 0;
      transform: translateY(-20px);
      transition: all 1.5s ease-out;
      z-index: 4;
    }

    .brand-text.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="pattern-overlay"></div>

  <div class="overlay" id="enterOverlay">
    <div class="enter-text">Click to Enter</div>
  </div>

  <div class="content" id="mainContent">
    <div class="brand-text" id="brandText">pawsocks</div>
    
    <div class="main-text" id="mainText">
      we love paw socks
      <span class="heart">♡</span>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('enterOverlay');
    const mainContent = document.getElementById('mainContent');
    const brandText = document.getElementById('brandText');
    const mainText = document.getElementById('mainText');

    overlay.addEventListener('click', () => {
      overlay.classList.add('hidden');
      
      setTimeout(() => {
        mainContent.classList.add('visible');
        brandText.classList.add('visible');
        mainText.classList.add('visible');
      }, 800);
    });
  </script>

</body>
</html>
