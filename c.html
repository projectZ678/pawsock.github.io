<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pawsocks.lat</title>
  
  <!-- Google Fonts: Fuzzy Bubbles for bubbly look -->
  <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      background: #000;
    }

    /* Animated blurred background */
    .background {
      position: fixed;
      inset: 0;
      background: url('https://i.pinimg.com/736x/75/80/cd/7580cd8e3a872bfd73d7512983140a9f.jpg') center center / cover no-repeat;
      filter: blur(9px) brightness(0.65);
      animation: bgBreath 18s infinite ease-in-out;
      z-index: 1;
    }

    @keyframes bgBreath {
      0%,100% { transform: scale(1.05); }
      50%     { transform: scale(1.12); }
    }

    /* Full-page repeating paws pattern overlay (subtle) */
    .pattern-overlay {
      position: fixed;
      inset: 0;
      background: url('https://i.etsystatic.com/59387736/r/il/9966dd/6903945070/il_fullxfull.6903945070_29hk.jpg') repeat;
      background-size: 220px 220px; /* adjust tile size for better look */
      opacity: 0.18; /* subtle – increase to 0.25 if you want it stronger */
      pointer-events: none;
      animation: floatPattern 60s infinite linear;
      z-index: 2;
    }

    @keyframes floatPattern {
      0%   { background-position: 0 0; }
      100% { background-position: 440px 440px; }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .enter-text {
      font-size: 4.5rem;
      font-weight: bold;
      text-shadow: 0 0 25px rgba(255,180,220,0.9);
      letter-spacing: 5px;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 4;
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .content.visible { display: flex; }

    .title {
      position: absolute;
      top: 30px;
      left: 40px;
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    /* Glitchy PFP */
    .pfp-container {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .pfp {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      object-fit: cover;
      border: 7px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 50px rgba(255,255,255,0.6);
      animation: glitch 7s infinite;
    }

    @keyframes glitch {
      0%, 92%, 100% { transform: translate(0); filter: none; }
      93% { transform: translate(-3px, 2px); filter: brightness(1.3); }
      94% { transform: translate(4px, -3px); filter: contrast(1.4); }
      95% { transform: translate(-2px, 1px); }
    }

    /* Bubbly glowing text under PFP */
    .name-text {
      font-family: 'Fuzzy Bubbles', cursive;
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffffff;
      text-shadow: 
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #fff,
        0 0 60px rgba(255,255,255,0.7);
      animation: glowPulse 3s infinite ease-in-out;
      margin-bottom: 1rem;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff; }
      50%      { text-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 70px rgba(255,255,255,0.9); }
    }

    /* Hidden audio player */
    #player {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    /* Floating paws in corner (kept for fun) */
    .paws {
      position: absolute;
      bottom: 12%;
      right: 8%;
      width: 200px;
      height: 200px;
    }

    .paw {
      position: absolute;
      width: 70px;
      height: 70px;
      opacity: 0.9;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.8));
      animation: floatPaw 7s infinite ease-in-out;
    }

    .paw1 { top: 0; left: 70px; animation-delay: 0s; }
    .paw2 { top: 80px; left: 0; animation-delay: 1.8s; }
    .paw3 { top: 80px; right: 0; animation-delay: 3.5s; }

    @keyframes floatPaw {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%     { transform: translateY(-15px) rotate(8deg); }
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="pattern-overlay"></div>

  <div class="overlay" id="enterOverlay">
    <div class="enter-text">Click to Enter</div>
  </div>

  <div class="content" id="mainContent">
    <div class="title">pawsocks.lat</div>

    <div class="pfp-container">
      <img 
        src="https://i.pinimg.com/736x/a4/4e/37/a44e37613ce98c11b8bb3c63fb3e01e2.jpg" 
        alt="Profile" 
        class="pfp"
      >
    </div>

    <div class="name-text">pawsocks.lat</div>

    <div class="paws">
      <img class="paw paw1" src="https://freesvg.org/img/paw-print.png" alt="paw">
      <img class="paw paw2" src="https://freesvg.org/img/paw-print.png" alt="paw">
      <img class="paw paw3" src="https://freesvg.org/img/paw-print.png" alt="paw">
    </div>
  </div>

  <iframe 
    id="player"
    src="https://www.youtube.com/embed/SA_Xved0nlU?autoplay=0&mute=1&loop=1&playlist=SA_Xved0nlU&rel=0&controls=0&showinfo=0&modestbranding=1"
    allow="autoplay; encrypted-media"
    frameborder="0">
  </iframe>

  <script>
    const overlay = document.getElementById('enterOverlay');
    const content = document.getElementById('mainContent');
    const player  = document.getElementById('player');

    overlay.addEventListener('click', () => {
      overlay.classList.add('hidden');
      setTimeout(() => {
        content.classList.add('visible');
        player.src = player.src.replace('autoplay=0', 'autoplay=1');
      }, 1000);
    });
  </script>

</body>
</html>
